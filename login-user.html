<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>일반 인원 로그인</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./config.js"></script>
    <script defer src="./auth.js"></script>
    <script defer src="./app.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        window.App.initGeneralLoginPage().catch((error) => {
          console.error(error);
        });
      });
    </script>
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-box">
        <h1>일반 인원 로그인</h1>
        <p class="muted">비밀번호만 입력해서 접속합니다.</p>

        <form id="general-login-form">
          <label>
            공용 비밀번호
            <input
              id="general-password"
              class="input"
              type="password"
              placeholder="YEOUIDO"
              required
            />
          </label>
          <button type="submit" class="btn">로그인</button>
          <p id="general-login-message" class="message"></p>
        </form>

        <p style="margin-top: 16px">
          매니저/관리자는 <a id="go-staff-link" href="./login-staff.html">여기</a>에서 로그인하세요.
        </p>
      </section>
    </main>
  </body>
</html>
