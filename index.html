<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메인 페이지</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./auth.js"></script>
    <script defer src="./app.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        window.App.initMainPage();
      });
    </script>
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">학교 포털</div>
        <nav class="nav">
          <a href="./index.html">메인(C)</a>
          <a href="./anonymous.html">익명 건의함</a>
          <a href="./manager.html" data-min-role="B">매니저 전용(B)</a>
          <a href="./admin.html" data-min-role="A">관리자 전용(A)</a>
        </nav>
        <div>
          <span data-user-info class="muted"></span>
          <button type="button" class="btn ghost" data-logout>로그아웃</button>
        </div>
      </div>
    </header>

    <main class="container page-wrap">
      <h1>기본 메인 페이지</h1>
      <p>
        현재 권한:
        <span class="role-badge" data-current-role></span>
      </p>

      <section class="grid">
        <article class="card">
          <h3>익명 건의함</h3>
          <p>건의는 누구나 등록할 수 있습니다.</p>
          <a class="btn" href="./anonymous.html">건의함 바로가기</a>
        </article>

        <article class="card">
          <h3>오늘의 급식</h3>
          <form id="meal-form">
            <label>
              시도교육청코드
              <input id="office-code" class="input" value="B10" required />
            </label>
            <label>
              학교코드
              <input id="school-code" class="input" value="7010096" required />
            </label>
            <label>
              날짜
              <input id="meal-date" class="input" type="date" required />
            </label>
            <button type="submit" class="btn">급식 조회</button>
          </form>
          <div id="meal-result" class="message">날짜를 선택하고 급식을 조회해주세요. (학교,교육청 코드 변경시 우리학교 급식 안뜸!!)</div>
        </article>

        <article class="card">
          <h3>공지사항</h3>
          <ul class="notice-list">
            <li>모든 페이지는 로그인 후 접근 가능합니다.</li>
            <li>A 등급: 관리자 전용, B 등급: 매니저 이상, C 등급: 로그인 사용자.</li>
            <li>일반 인원 로그인 비밀번호는 <strong>YEOUIDO</strong> 입니다.</li>
          </ul>
        </article>
      </section>
    </main>
  </body>
</html>
